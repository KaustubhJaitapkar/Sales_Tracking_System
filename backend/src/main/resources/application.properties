spring.application.name=sales-manager
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sales_tracking_sys
spring.datasource.username=root
spring.datasource.password=22510113
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Lazy loading configuration
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Jackson Configuration for JSON serialization
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non_null

# Validation Configuration
# spring.validation.enabled=true
spring.validation.enabled=false


# Logging Configuration
logging.level.root=WARN
logging.level.com.rocket=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.boot=INFO

# Console Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# File Logging Configuration
logging.file.name=logs/rocket-application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n